services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: cryptoview
      POSTGRES_PASSWORD: cryptoview
      POSTGRES_DB: cryptoview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./infra/migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata:
